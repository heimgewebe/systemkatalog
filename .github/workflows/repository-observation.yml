name: Repository Observation

on:
  pull_request:
    branches:
      - main
    paths:
      - "policy/repository-observation.json"
      - "**/Repository Reference.md"
      - "docs/blueprints/repository-observer-v1.md"
      - "scripts/observe-repositories.py"
      - "scripts/observer_*.py"
      - "scripts/repository_observer.py"
      - "scripts/tests/repository_observer_fixture.py"
      - "scripts/tests/test_repository_observer_*.py"
      - ".github/workflows/repository-observation.yml"
  push:
    branches:
      - main
    paths:
      - "policy/repository-observation.json"
      - "**/Repository Reference.md"
      - "docs/blueprints/repository-observer-v1.md"
      - "scripts/observe-repositories.py"
      - "scripts/observer_*.py"
      - "scripts/repository_observer.py"
      - "scripts/tests/repository_observer_fixture.py"
      - "scripts/tests/test_repository_observer_*.py"
      - ".github/workflows/repository-observation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate policy
        run: python3 scripts/observe-repositories.py validate-policy --repo-root .

      - name: Test observer
        run: timeout --signal=TERM --kill-after=10s 60s python3 -m unittest discover -s scripts/tests -p 'test_repository_observer_*.py'
