name: Legacy Cabinet Maintenance Compatibility

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  maintenance-radar:
    name: Validate legacy Cabinet maintenance compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Test External Artifact Registry
        run: python3 -m unittest discover -s scripts/tests -p 'test_external*.py'

      - name: Validate External Artifact Registry
        run: python3 scripts/validate_external_dump_sources.py

      - name: Test Cabinet Ecosystem Signals
        run: python3 -m unittest discover -s scripts/tests -p 'test_ecosystem_signal_contract.py'

      - name: Validate Cabinet Ecosystem Signal Fixture
        run: python3 scripts/validate_ecosystem_signals.py --input scripts/tests/fixtures/ecosystem-signals/github-pr-signals.jsonl --json

      - name: Test Cabinet Maintenance Radar Policy
        run: python3 -m unittest discover -s scripts/tests -p 'test_cabinet_maintenance_radar.py'

      - name: Validate legacy Cabinet maintenance compatibility Policy
        run: python3 scripts/validate_cabinet_maintenance_radar.py

      - name: Test Cabinet Maintenance Report
        run: python3 -m unittest discover -s scripts/tests -p 'test_cabinet_maintenance_report.py'

      - name: Check Cabinet Maintenance Report
        run: |
          mkdir -p .tmp
          python3 scripts/write_cabinet_maintenance_report.py --check --json | tee .tmp/cabinet-maintenance-report-check.json

      - name: Build Cabinet Maintenance Report Artifact
        run: |
          mkdir -p .tmp
          python3 scripts/write_cabinet_maintenance_report.py \
            --output .tmp/cabinet-maintenance-report.json \
            --json \
            | tee .tmp/cabinet-maintenance-report-status.json
          python3 -m json.tool .tmp/cabinet-maintenance-report.json > /dev/null

      - name: Summarize Cabinet Maintenance Report
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path(".tmp/cabinet-maintenance-report.json").read_text(encoding="utf-8"))
          summary = report["summary"]
          lines = [
              "# Cabinet Maintenance Report",
              "",
              f"- status: {summary['status']}",
              f"- findingCount: {summary['findingCount']}",
              f"- epistemicGapCount: {summary['epistemicGapCount']}",
              f"- bureauCandidateCount: {summary['bureauCandidateCount']}",
              "",
              "| severity | count |",
              "|---|---:|",
          ]
          for severity, count in summary["severityCounts"].items():
              lines.append(f"| {severity} | {count} |")
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload Cabinet Maintenance Report
        uses: actions/upload-artifact@v4
        with:
          name: cabinet-maintenance-report
          path: |
            .tmp/cabinet-maintenance-report.json
            .tmp/cabinet-maintenance-report-status.json
            .tmp/cabinet-maintenance-report-check.json
