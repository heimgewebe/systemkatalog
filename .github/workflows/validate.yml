name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  repository-contract:
    name: Repository Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Bind pull request durability ref
        if: github.event_name == 'pull_request'
        env:
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.clone_url }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch --no-tags "$PR_HEAD_REPOSITORY" \
            "refs/heads/$PR_HEAD_REF:refs/remotes/pull-request/head"
          observed_head="$(git rev-parse refs/remotes/pull-request/head)"
          if [[ "$observed_head" != "$PR_HEAD_SHA" ]]; then
            echo "FAIL: fetched PR head $observed_head does not match event head $PR_HEAD_SHA"
            exit 1
          fi
          echo "SYSTEMKATALOG_DURABLE_SOURCE_REF=refs/remotes/pull-request/head" >> "$GITHUB_ENV"
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Validate repository
        run: ./scripts/ci/validate-repository.sh
      - name: Test validator fail-closed behavior
        run: ./scripts/ci/test-validate-repository.sh

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Ensure no custom ignore files
        run: |
          if [[ -f .gitleaks.toml ]] || [[ -f .gitleaksignore ]]; then
            echo "FAIL: custom gitleaks configuration could hide secrets"
            exit 1
          fi
      - name: Setup output directory
        run: mkdir -p "${RUNNER_TEMP}/systemkatalog-gitleaks"
      - name: Gitleaks contract tests
        run: ./scripts/ci/test-gitleaks-contract.sh
      - name: Gitleaks history scan
        run: |
          ./scripts/ci/run-gitleaks.sh --mode git --source "$GITHUB_WORKSPACE" \
            --report "${RUNNER_TEMP}/systemkatalog-gitleaks/history.json" --label history
      - name: Gitleaks tree scan
        run: |
          ./scripts/ci/run-gitleaks.sh --mode dir --source "$GITHUB_WORKSPACE" \
            --report "${RUNNER_TEMP}/systemkatalog-gitleaks/tree.json" --label tree
