name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  repository-contract:
    name: Repository Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate Repository Contract
        run: ./scripts/ci/validate-repository.sh

      - name: Test Validator
        run: ./scripts/ci/test-validate-repository.sh

      - name: Test Phase Four Layout
        run: timeout --signal=TERM --kill-after=10s 60s python3 -m unittest discover -s scripts/tests -p 'test_phase4_*.py'

      - name: Test Repository Inventory Generator
        run: timeout --signal=TERM --kill-after=10s 60s python3 -m unittest discover -s scripts/tests -p 'test_build_repository_index.py'

      - name: Test Repository Inventory Entrypoint
        run: python3 -m unittest discover -s scripts/tests -p 'test_repository_inventory_entrypoint.py'

      - name: Test Repository Inventory Hygiene
        run: python3 -m unittest discover -s scripts/tests -p 'test_repository_inventory_hygiene.py'

      - name: Test Bridge Artifact Manifest
        run: python3 -m unittest discover -s scripts/tests -p 'test_bridge_artifact_manifest.py'

      - name: Check Cabinet Maintenance Report
        run: python3 scripts/write_cabinet_maintenance_report.py --check

      - name: Test Cabinet Maintenance Report
        run: python3 -m unittest discover -s scripts/tests -p 'test_cabinet_maintenance_report.py'

      - name: Test External Artifact Registry
        run: python3 -m unittest discover -s scripts/tests -p 'test_external*.py'

      - name: Test rLens Repository Reference Importer
        run: python3 -m unittest discover -s scripts/tests -p 'test_rlens_repository_reference_import.py'

      - name: Validate External Artifact Registry
        run: python3 scripts/validate_external_dump_sources.py

      - name: Test Cabinet Ecosystem Signals
        run: python3 -m unittest discover -s scripts/tests -p 'test_ecosystem_signal_contract.py'

      - name: Validate Cabinet Ecosystem Signal Fixture
        run: python3 scripts/validate_ecosystem_signals.py --input scripts/tests/fixtures/ecosystem-signals/github-pr-signals.jsonl --json

      - name: Check Cabinet Frontier Contract
        run: python3 scripts/write_cabinet_frontier.py --check --json

      - name: Test Cabinet Frontier Contract
        run: python3 -m unittest discover -s scripts/tests -p 'test_cabinet_frontier_contract.py'

      - name: Test Gemini Maintenance Scan Contract
        run: python3 -m unittest discover -s scripts/tests -p 'test_gemini_maintenance_scan_contract.py'

  installer-shadow:
    name: Installer Shadow Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Test Local Runtime Install
        run: ./scripts/ci/test-install-local-runtime.sh

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Ensure no custom ignore files
        run: |
          if [[ -f .gitleaks.toml ]] || [[ -f .gitleaksignore ]]; then
            echo "FAIL: Custom gitleaks configuration found, which might hide secrets."
            exit 1
          fi

      - name: Setup Output Directory
        run: mkdir -p "${RUNNER_TEMP}/cabinet-gitleaks"

      - name: Gitleaks Contract Tests
        run: ./scripts/ci/test-gitleaks-contract.sh

      - name: Gitleaks History Scan
        run: |
          ./scripts/ci/run-gitleaks.sh \
            --mode git \
            --source "$GITHUB_WORKSPACE" \
            --report "${RUNNER_TEMP}/cabinet-gitleaks/history.json" \
            --label history

      - name: Gitleaks Tree Scan
        run: |
          ./scripts/ci/run-gitleaks.sh \
            --mode dir \
            --source "$GITHUB_WORKSPACE" \
            --report "${RUNNER_TEMP}/cabinet-gitleaks/tree.json" \
            --label tree
