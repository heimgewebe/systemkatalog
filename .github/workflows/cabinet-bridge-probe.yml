name: Cabinet Bridge Probe

on:
  push:
    branches:
      - main
    paths:
      - registry/ecosystem/**
      - .github/workflows/cabinet-bridge-probe.yml
  pull_request:
    branches:
      - main
    paths:
      - registry/ecosystem/**
      - .github/workflows/cabinet-bridge-probe.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  BUREAU_PROBE_REF: "a265385fcc2365ee9c85e6a04b0ac1d2813cc60a"

jobs:
  probe:
    name: Run Cabinet-Bureau bridge probe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Cabinet
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout Bureau policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: heimgewebe/bureau
          ref: ${{ env.BUREAU_PROBE_REF }}
          path: bureau-policy
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Bureau probe
        run: python -m pip install "git+https://github.com/heimgewebe/bureau.git@${BUREAU_PROBE_REF}"

      - name: Run Bureau import policy gate
        working-directory: bureau-policy
        run: |
          bureau-cabinet-bridge-import-policy \
            --json \
            --policy docs/cabinet-bridge-import-review-contract-v0.policy.json \
            | tee ../bridge-import-policy-review.json

      - name: Check Bureau import policy gate
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          policy = json.loads(Path("bridge-import-policy-review.json").read_text(encoding="utf-8"))
          assert policy["kind"] == "bureau.cabinet_bridge_import_review_contract_policy_review"
          assert policy["status"] == "valid"
          assert policy["importAllowed"] is False
          assert policy["importReviewRequired"] is True
          print("policy=%s importReviewRequired=%s" % (
              policy["status"],
              policy["importReviewRequired"],
          ))
          PY

      - name: Run bridge probe
        run: |
          bureau --json cabinet-bridge-probe \
            --bridge-policy registry/ecosystem/bureau-bridge.json \
            | tee bridge-probe-report.json

      - name: Check and summarize report
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("bridge-probe-report.json").read_text(encoding="utf-8"))
          assert report["kind"] == "cabinet_bureau_bridge_probe"
          assert report["importAllowed"] is False
          assert report["dispatchAllowed"] is False
          assert report["queueMutationAllowed"] is False
          assert report["taskCreationAllowed"] is False
          assert report["admissibleCount"] >= 1
          assert report["blockedCount"] >= 1

          summary = Path("bridge-probe-summary.md")
          rows = [
              "# Cabinet Bridge Probe",
              "",
              f"- candidateCount: {report['candidateCount']}",
              f"- admissibleCount: {report['admissibleCount']}",
              f"- blockedCount: {report['blockedCount']}",
              "",
              "| id | decision | reasons |",
              "|---|---|---|",
          ]
          for candidate in report["candidates"]:
              reasons = ", ".join(candidate.get("reasons") or [])
              rows.append(f"| {candidate['id']} | {candidate['decision']} | {reasons} |")
          summary.write_text("\n".join(rows) + "\n", encoding="utf-8")

          github_step_summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          github_step_summary.write_text(summary.read_text(encoding="utf-8"), encoding="utf-8")
          print("candidateCount=%s admissibleCount=%s blockedCount=%s" % (
              report["candidateCount"],
              report["admissibleCount"],
              report["blockedCount"],
          ))
          PY

      - name: Run bridge preview
        run: |
          bureau-cabinet-bridge-preview \
            --json \
            --probe-report bridge-probe-report.json \
            --candidate-id claim:bureau-consumes-approved-candidates-v0 \
            --task-id BUR-CAB-BRIDGE-001 \
            --initiative BUR-CAB \
            --target-proof "Cabinet bridge probe has an admissible candidate and preview remains proposal-only." \
            --approve \
            | tee bridge-preview.json

      - name: Check preview proposal
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          preview = json.loads(Path("bridge-preview.json").read_text(encoding="utf-8"))
          assert preview["kind"] == "cabinet_bridge_promotion_preview"
          assert preview["mode"] == "proposal_only"
          assert preview["importAllowed"] is False
          assert preview["dispatchAllowed"] is False
          assert preview["queueMutationAllowed"] is False
          assert preview["taskCreationAllowed"] is False
          task = preview["task"]
          assert task["execution"]["mode"] == "manual"
          assert task["execution"]["policy"] == "review-before-effect"
          assert task["metadata"]["import_allowed"] is False
          assert task["metadata"]["dispatch_allowed"] is False
          assert task["metadata"]["queue_mutation_allowed"] is False
          assert task["metadata"]["task_creation_allowed"] is False
          print("previewTask=%s candidate=%s" % (
              task["id"],
              task["metadata"]["source_candidate_id"],
          ))
          PY

      - name: Run bridge review gate
        run: |
          bureau-cabinet-bridge-review \
            --json \
            --preview bridge-preview.json \
            | tee bridge-review.json

      - name: Check review gate
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          gate = json.loads(Path("bridge-review.json").read_text(encoding="utf-8"))
          assert gate["kind"] == "cabinet_bridge_preview_review_gate"
          assert gate["status"] == "requires_human_review"
          assert gate["reviewRequired"] is True
          assert gate["importAllowed"] is False
          assert gate["dispatchAllowed"] is False
          assert gate["queueMutationAllowed"] is False
          assert gate["taskCreationAllowed"] is False
          print("reviewGate=%s task=%s" % (gate["status"], gate["taskId"]))
          PY

      - name: Run bridge receipt
        run: |
          bureau-cabinet-bridge-receipt \
            --json \
            --review-gate bridge-review.json \
            --reviewer cabinet-ci-review-gate \
            --decision ready-for-design \
            --evidence "Cabinet CI produced a requires_human_review gate with all effect flags disabled." \
            --note "Technical receipt only; this is not an import approval." \
            | tee bridge-receipt.json

      - name: Check receipt
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          receipt = json.loads(Path("bridge-receipt.json").read_text(encoding="utf-8"))
          assert receipt["kind"] == "cabinet_bridge_review_receipt"
          assert receipt["status"] == "review_recorded"
          assert receipt["reviewer"] == "cabinet-ci-review-gate"
          assert receipt["decision"] == "ready-for-design"
          assert receipt["importAllowed"] is False
          assert receipt["importReviewRequired"] is True
          assert receipt["dispatchAllowed"] is False
          assert receipt["queueMutationAllowed"] is False
          assert receipt["taskCreationAllowed"] is False
          print("receipt=%s task=%s" % (
              receipt["status"],
              receipt["sourceGate"]["taskId"],
          ))
          PY

      - name: Upload bridge probe report
        uses: actions/upload-artifact@v4
        with:
          name: cabinet-bridge-probe-report
          path: |
            bridge-import-policy-review.json
            bridge-probe-report.json
            bridge-probe-summary.md
            bridge-preview.json
            bridge-review.json
            bridge-receipt.json
