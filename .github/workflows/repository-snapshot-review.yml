name: Repository Snapshot Review

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/build-repository-snapshot-review.py"
      - "scripts/snapshot_review_model.py"
      - "scripts/tests/test_build_repository_snapshot_review.py"
      - "pruefung/10 Laeufe/repository-snapshot-review-v1.md"
      - "steuerung/10 Lage/repository-snapshots-v1.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Test snapshot review generator
        run: python3 -m unittest discover -s scripts/tests -p 'test_build_repository_snapshot_review.py'
