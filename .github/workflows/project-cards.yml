name: Project Cards

on:
  pull_request:
    branches:
      - main
    paths:
      - "bestand/20 Projekte/**"
      - "heimgewebe/**"
      - "weltgewebe/**"
      - "docs/blueprints/project-card-v1.md"
      - "scripts/check-project-cards.py"
      - "scripts/tests/test_project_cards_*.py"
      - ".github/workflows/project-cards.yml"
  push:
    branches:
      - main
    paths:
      - "bestand/20 Projekte/**"
      - "heimgewebe/**"
      - "weltgewebe/**"
      - "docs/blueprints/project-card-v1.md"
      - "scripts/check-project-cards.py"
      - "scripts/tests/test_project_cards_*.py"
      - ".github/workflows/project-cards.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate cards
        run: python3 scripts/check-project-cards.py .

      - name: Test validator
        run: timeout --signal=TERM --kill-after=10s 60s python3 -m unittest discover -s scripts/tests -p 'test_project_cards_*.py'
