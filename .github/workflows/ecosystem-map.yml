name: Ecosystem Map

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  validate:
    name: Validate Ecosystem Map
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate registry and bridge
        run: python3 scripts/validate_ecosystem_map.py

      - name: Check registry Mermaid projection
        run: python3 scripts/render_ecosystem_registry_map.py --check

      - name: Check ecosystem map artifact manifest
        run: python3 scripts/write_ecosystem_map_artifact_manifest.py --check

      - name: Test registry Mermaid projection
        run: python3 -m unittest discover -s scripts/tests -p 'test_ecosystem_registry_map_render.py'

      - name: Test ecosystem map artifact manifest
        run: python3 -m unittest discover -s scripts/tests -p 'test_ecosystem_map_artifact_manifest.py'
