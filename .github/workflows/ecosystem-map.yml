name: Ecosystem Map

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  validate:
    name: Validate Ecosystem Map
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Bind pull request durability ref
        if: github.event_name == 'pull_request'
        env:
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.clone_url }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch --no-tags "$PR_HEAD_REPOSITORY" \
            "refs/heads/$PR_HEAD_REF:refs/remotes/pull-request/head"
          observed_head="$(git rev-parse refs/remotes/pull-request/head)"
          if [[ "$observed_head" != "$PR_HEAD_SHA" ]]; then
            echo "FAIL: fetched PR head $observed_head does not match event head $PR_HEAD_SHA"
            exit 1
          fi
          echo "SYSTEMKATALOG_DURABLE_SOURCE_REF=refs/remotes/pull-request/head" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate registry
        run: python3 scripts/validate_ecosystem_map.py

      - name: Check generated Mermaid projection
        run: python3 scripts/render_ecosystem_registry_map.py --check

      - name: Verify published read-only map manifest
        run: |
          manifest_args=(--check)
          if [[ -n "${SYSTEMKATALOG_DURABLE_SOURCE_REF:-}" ]]; then
            manifest_args+=(--durable-source-ref "$SYSTEMKATALOG_DURABLE_SOURCE_REF")
          fi
          python3 scripts/write_ecosystem_map_artifact_manifest.py "${manifest_args[@]}"

      - name: Test map projection and manifest
        run: python3 -m unittest discover -s scripts/tests -p 'test_ecosystem_*.py'

      - name: Checkout Metarepo Fleet authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: heimgewebe/metarepo
          path: _fleet-authority
          persist-credentials: false
          sparse-checkout: fleet/repos.yml
          sparse-checkout-cone-mode: false

      - name: Check Fleet coverage against Metarepo
        run: python3 scripts/check_fleet_coverage.py --fleet-file _fleet-authority/fleet/repos.yml

      - name: Mint read-only Heimgewebe inventory token
        id: organization-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.HEIMGEWEBE_APP_ID }}
          private-key: ${{ secrets.HEIMGEWEBE_APP_PRIVATE_KEY }}
          owner: heimgewebe
          permission-metadata: read
          permission-contents: read

      - name: Read complete Heimgewebe repository inventory
        env:
          GH_TOKEN: ${{ steps.organization-token.outputs.token }}
        run: |
          gh repo list heimgewebe --limit 200 \
            --json name,nameWithOwner,isArchived,isFork,visibility \
            > "${RUNNER_TEMP}/heimgewebe-repositories.json"

      - name: Check complete organization scope against GitHub
        run: |
          python3 scripts/check_organization_scope.py \
            --github-inventory "${RUNNER_TEMP}/heimgewebe-repositories.json"


      - name: Read bound source observations
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ steps.organization-token.outputs.token }}
        run: |
          python3 scripts/read_github_catalog_observations.py \
            --output "${RUNNER_TEMP}/systemkatalog-observations.json"

      - name: Check proposal-only catalog drift
        if: github.event_name != 'pull_request'
        run: |
          set +e
          python3 scripts/system_catalog_drift.py \
            --github-observations "${RUNNER_TEMP}/systemkatalog-observations.json" \
            --fleet-file _fleet-authority/fleet/repos.yml \
            --output "${RUNNER_TEMP}/systemkatalog-drift-report.json" \
            --proposal-output "${RUNNER_TEMP}/systemkatalog-update-proposal.json" \
            --check
          status=$?
          cat "${RUNNER_TEMP}/systemkatalog-drift-report.json"
          exit "$status"
