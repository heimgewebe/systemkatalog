name: Ecosystem Map

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  validate:
    name: Validate Ecosystem Map
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate registry
        run: python3 scripts/validate_ecosystem_map.py

      - name: Check generated Mermaid projection
        run: python3 scripts/render_ecosystem_registry_map.py --check

      - name: Verify published read-only map manifest
        run: python3 scripts/write_ecosystem_map_artifact_manifest.py --check

      - name: Test map projection and manifest
        run: python3 -m unittest discover -s scripts/tests -p 'test_ecosystem_*.py'

      - name: Checkout Metarepo Fleet authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: heimgewebe/metarepo
          path: _fleet-authority
          persist-credentials: false
          sparse-checkout: fleet/repos.yml
          sparse-checkout-cone-mode: false

      - name: Check Fleet coverage against Metarepo
        run: python3 scripts/check_fleet_coverage.py --fleet-file _fleet-authority/fleet/repos.yml

      - name: Mint read-only Heimgewebe inventory token
        id: organization-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.HEIMGEWEBE_APP_ID }}
          private-key: ${{ secrets.HEIMGEWEBE_APP_PRIVATE_KEY }}
          owner: heimgewebe
          permission-metadata: read

      - name: Read complete Heimgewebe repository inventory
        env:
          GH_TOKEN: ${{ steps.organization-token.outputs.token }}
        run: |
          gh repo list heimgewebe --limit 200 \
            --json name,nameWithOwner,isArchived,isFork,visibility \
            > "${RUNNER_TEMP}/heimgewebe-repositories.json"

      - name: Check complete organization scope against GitHub
        run: |
          python3 scripts/check_organization_scope.py \
            --github-inventory "${RUNNER_TEMP}/heimgewebe-repositories.json"
